<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Tadapop — balloon-check pop">
  <defs>
    <radialGradient id="bgC" cx="50%" cy="36%" r="82%">
      <stop offset="0%" stop-color="#141A29"/><stop offset="100%" stop-color="#0B0E17"/>
    </radialGradient>
    <linearGradient id="ambC" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#FFCB7A"/><stop offset="100%" stop-color="#E8922E"/>
    </linearGradient>
    <filter id="glowC" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bgC)"/>
  <rect x="1.5" y="1.5" width="509" height="509" rx="110.5" fill="none" stroke="#26304A" stroke-width="3"/>

  <!-- pop ring -->
  <ellipse cx="252" cy="232" rx="158" ry="166" fill="none" stroke="#FFB454" stroke-width="3" stroke-dasharray="3 16" opacity="0.5"/>

  <!-- balloon body with a check cut from it (negative space) -->
  <g filter="url(#glowC)">
    <ellipse cx="252" cy="230" rx="112" ry="124" fill="url(#ambC)"/>
  </g>
  <!-- the checkmark, carved in navy -->
  <path d="M196 234 L240 280 L322 184" fill="none" stroke="#0B0E17" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- confetti scattered all around the outer ring -->
  <g>
    <!-- top arc -->
    <circle cx="252" cy="54" r="9" fill="#FFB454"/>
    <rect x="160" y="74" width="18" height="18" rx="4" fill="#5BE39B" transform="rotate(24 169 83)"/>
    <path d="M336 70 l 26 -8 -10 25 z" fill="#7FA9FF"/>
    <circle cx="118" cy="120" r="8" fill="#FF9A7C"/>
    <path d="M392 116 l -25 -10 8 26 z" fill="#FFB454"/>
    <!-- sides -->
    <rect x="74" y="206" width="18" height="18" rx="4" fill="#7FA9FF" transform="rotate(-18 83 215)"/>
    <circle cx="424" cy="206" r="9" fill="#5BE39B"/>
    <circle cx="92" cy="300" r="7" fill="#FFB454"/>
    <rect x="414" y="290" width="16" height="16" rx="4" fill="#FF9A7C" transform="rotate(28 422 298)"/>
    <!-- bottom arc -->
    <path d="M150 374 l 24 12 -24 12 z" fill="#5BE39B"/>
    <circle cx="252" cy="410" r="8" fill="#7FA9FF"/>
    <path d="M362 374 l -24 12 24 12 z" fill="#FFB454"/>
    <circle cx="316" cy="402" r="6" fill="#FF9A7C"/>
    <circle cx="188" cy="402" r="6" fill="#FFB454"/>
  </g>
</svg>
